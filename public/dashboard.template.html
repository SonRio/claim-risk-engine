<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fraud Scoring — Claims Risk Dashboard</title>
<style>
  :root {
    --bg: #0a0e16; --panel: #121925; --panel-2: #0f1420; --line: #1f2937;
    --txt: #e6edf6; --muted: #8b9bb0; --accent: #5b8cff; --accent-2: #7c5cff;
    --good: #2dd4a7; --bad: #ff5c7a; --warn: #ffb454;
    --radius: 14px; --shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(1200px 600px at 80% -10%, #15203a 0%, var(--bg) 55%);
    color: var(--txt); font: 14px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased; padding: 28px clamp(16px, 4vw, 48px) 64px;
  }
  a { color: var(--accent); }
  header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 26px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: -.02em; }
  .sub { color: var(--muted); margin-top: 4px; font-size: 13px; }
  .badge { padding: 8px 16px; border-radius: 999px; font-weight: 700; font-size: 13px; letter-spacing: .03em;
    border: 1px solid transparent; white-space: nowrap; }
  .badge.pass { background: rgba(45,212,167,.12); color: var(--good); border-color: rgba(45,212,167,.4); }
  .badge.fail { background: rgba(255,92,122,.12); color: var(--bad); border-color: rgba(255,92,122,.4); }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .card { background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
  .card .value { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -.02em; }
  .card .foot { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .value.good { color: var(--good); } .value.bad { color: var(--bad); }

  .grid2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; margin-bottom: 22px; }
  @media (max-width: 860px) { .grid2 { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
  .panel h2 { font-size: 14px; margin: 0 0 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }

  .bars { display: flex; flex-direction: column; gap: 9px; }
  .bar-row { display: grid; grid-template-columns: 130px 1fr 54px; align-items: center; gap: 10px; font-size: 12px; }
  .bar-track { background: #0c1220; border-radius: 6px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .bar-row .num { color: var(--muted); text-align: right; }

  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  input[type=search], select { background: var(--panel-2); border: 1px solid var(--line); color: var(--txt);
    padding: 9px 12px; border-radius: 10px; font-size: 13px; outline: none; }
  input[type=search] { min-width: 220px; }
  input[type=search]:focus, select:focus { border-color: var(--accent); }
  .toggle { display: inline-flex; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; cursor: pointer; user-select: none; }
  .count { color: var(--muted); font-size: 13px; margin-left: auto; }

  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    padding: 10px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); }
  tbody td { padding: 11px 12px; border-bottom: 1px solid #161d2b; font-size: 13px; vertical-align: middle; }
  tbody tr.row { cursor: pointer; transition: background .12s; }
  tbody tr.row:hover { background: #161e2e; }
  .risk { display: flex; align-items: center; gap: 10px; min-width: 130px; }
  .risk .track { flex: 1; height: 8px; border-radius: 6px; background: #0c1220; overflow: hidden; }
  .risk .fill { height: 100%; border-radius: 6px; }
  .risk .n { width: 28px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; background: #1b2740; color: #aebfe0; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .evidence { background: var(--panel-2); }
  .evidence td { padding: 0 12px 0; }
  .evidence .inner { padding: 4px 0 14px; display: flex; flex-direction: column; gap: 8px; }
  .flag { display: grid; grid-template-columns: 170px 60px 1fr; gap: 10px; align-items: start; padding: 8px 12px;
    background: #0c1322; border: 1px solid var(--line); border-radius: 10px; }
  .flag .rule { font-weight: 600; color: var(--accent); }
  .flag .sev { color: var(--warn); font-variant-numeric: tabular-nums; }
  .flag .ev { color: var(--txt); }
  .muted { color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 28px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Fraud Scoring — Claims Risk Dashboard</h1>
    <div class="sub" id="subtitle"></div>
  </div>
  <div id="verdict" class="badge"></div>
</header>

<section class="cards" id="cards"></section>

<section class="grid2">
  <div class="panel">
    <h2>Risk score distribution</h2>
    <div id="hist"></div>
  </div>
  <div class="panel">
    <h2>Per-pattern recall</h2>
    <div class="bars" id="patterns"></div>
  </div>
</section>

<section class="panel">
  <div class="controls">
    <input type="search" id="q" placeholder="Search claim, member, provider…" />
    <select id="rule"><option value="">All rules</option></select>
    <label class="toggle"><input type="checkbox" id="flaggedOnly" checked /> Flagged only</label>
    <span class="count" id="count"></span>
  </div>
  <div style="overflow:auto; max-height: 70vh;">
    <table>
      <thead><tr>
        <th>Claim</th><th>Risk</th><th>Flags</th><th>Top rule</th><th>Diagnosis</th><th>Amount</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</section>

<script>
const DATA = __DATA__;
const { summary, rows } = DATA;

const riskColor = (s) => `hsl(${Math.round(120 - (s / 100) * 120)}, 75%, 52%)`;
const pct = (x) => (x * 100).toFixed(1) + '%';
const money = (n) => '$' + n.toLocaleString('en-US');

// ---- header + verdict ----
document.getElementById('subtitle').textContent =
  `${summary.total.toLocaleString()} claims scored · decision threshold ≥ ${summary.threshold} · ${summary.flagged} flagged`;
const verdict = document.getElementById('verdict');
verdict.textContent = summary.pass ? '✓ PASS TARGET' : '✕ FAIL TARGET';
verdict.className = 'badge ' + (summary.pass ? 'pass' : 'fail');

// ---- metric cards ----
const cards = [
  { label: 'Precision', value: pct(summary.precision) },
  { label: 'Recall', value: pct(summary.recall), cls: summary.recall >= 0.7 ? 'good' : 'bad', foot: 'target ≥ 70%' },
  { label: 'False Positive Rate', value: pct(summary.fpr), cls: summary.fpr <= 0.2 ? 'good' : 'bad', foot: 'target ≤ 20%' },
  { label: 'Flagged', value: summary.flagged.toLocaleString(), foot: `of ${summary.total.toLocaleString()} claims` },
  { label: 'TP / FP / FN', value: `${summary.tp}/${summary.fp}/${summary.fn}`, foot: 'true / false pos · false neg' },
];
document.getElementById('cards').innerHTML = cards.map(c =>
  `<div class="card"><div class="label">${c.label}</div>
   <div class="value ${c.cls||''}">${c.value}</div>
   <div class="foot">${c.foot||''}</div></div>`).join('');

// ---- score histogram (inline SVG) ----
const buckets = Array.from({length: 10}, () => 0);
for (const r of rows) buckets[Math.min(9, Math.floor(r.score / 10))]++;
const maxB = Math.max(...buckets, 1);
const W = 520, H = 180, pad = 28, bw = (W - pad * 2) / 10;
let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">`;
buckets.forEach((b, i) => {
  const h = Math.round((b / maxB) * (H - pad * 2));
  const x = pad + i * bw, y = H - pad - h;
  const c = riskColor(i * 10 + 5);
  svg += `<rect x="${x + 3}" y="${y}" width="${bw - 6}" height="${h}" rx="4" fill="${c}" opacity="0.9"><title>${i*10}-${i*10+9}: ${b}</title></rect>`;
  if (b > 0) svg += `<text x="${x + bw/2}" y="${y - 5}" fill="#8b9bb0" font-size="10" text-anchor="middle">${b}</text>`;
  svg += `<text x="${x + bw/2}" y="${H - 9}" fill="#6b7a90" font-size="9" text-anchor="middle">${i*10}</text>`;
});
svg += `</svg>`;
document.getElementById('hist').innerHTML = svg;

// ---- per-pattern recall bars ----
const pp = summary.perPattern;
document.getElementById('patterns').innerHTML = Object.keys(pp).sort().map(k => {
  const v = pp[k];
  return `<div class="bar-row"><span>${k}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.recall*100)}%"></div></div>
    <span class="num">${v.caught}/${v.total}</span></div>`;
}).join('');

// ---- table with filters + expandable evidence ----
const ruleSet = [...new Set(rows.flatMap(r => r.flags.map(f => f.rule)))].sort();
const ruleSel = document.getElementById('rule');
ruleSel.innerHTML += ruleSet.map(r => `<option value="${r}">${r}</option>`).join('');

const tbody = document.getElementById('tbody');
const q = document.getElementById('q');
const flaggedOnly = document.getElementById('flaggedOnly');
const countEl = document.getElementById('count');
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function render() {
  const term = q.value.trim().toLowerCase();
  const ruleF = ruleSel.value;
  const onlyFlagged = flaggedOnly.checked;
  const filtered = rows.filter(r => {
    if (onlyFlagged && r.flags.length === 0) return false;
    if (ruleF && !r.flags.some(f => f.rule === ruleF)) return false;
    if (term && !(`${r.id} ${r.member} ${r.provider} ${r.dx}`.toLowerCase().includes(term))) return false;
    return true;
  });
  countEl.textContent = `${filtered.length.toLocaleString()} shown`;
  if (filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="empty">No matching claims</td></tr>`; return; }

  const view = filtered.slice(0, 400);
  tbody.innerHTML = view.map(r => {
    const col = riskColor(r.score);
    const flagsCell = r.flags.length
      ? `<span class="pill">${r.flags.length}</span>` : `<span class="muted">0</span>`;
    const top = r.topRule ? `<span class="mono">${r.topRule}</span>` : '<span class="muted">—</span>';
    const main = `<tr class="row" data-id="${esc(r.id)}">
      <td class="mono">${esc(r.id)}</td>
      <td><div class="risk"><div class="track"><div class="fill" style="width:${r.score}%;background:${col}"></div></div><span class="n">${r.score}</span></div></td>
      <td>${flagsCell}</td>
      <td>${top}</td>
      <td class="mono">${esc(r.dx)}</td>
      <td>${money(r.amount)}</td>
    </tr>`;
    const flagsHtml = r.flags.length
      ? r.flags.map(f => `<div class="flag"><span class="rule">${f.rule}</span><span class="sev">sev ${f.severity}</span><span class="ev">${esc(f.evidence)}</span></div>`).join('')
      : '<span class="muted">No rules fired for this claim.</span>';
    const detail = `<tr class="evidence" data-detail="${r.id}" style="display:none">
      <td colspan="6"><div class="inner">
        <span class="muted">${esc(r.id)} · member ${esc(r.member)} · provider ${esc(r.provider)} · ${esc(r.date)} · ${esc(r.type)}</span>
        ${flagsHtml}
      </div></td></tr>`;
    return main + detail;
  }).join('');
  if (filtered.length > view.length) {
    tbody.innerHTML += `<tr><td colspan="6" class="empty">Showing first ${view.length} of ${filtered.length}. Refine filters to see more.</td></tr>`;
  }
}

tbody.addEventListener('click', (e) => {
  const row = e.target.closest('tr.row');
  if (!row) return;
  const d = tbody.querySelector(`tr[data-detail="${row.dataset.id}"]`);
  if (d) d.style.display = d.style.display === 'none' ? 'table-row' : 'none';
});
q.addEventListener('input', render);
ruleSel.addEventListener('change', render);
flaggedOnly.addEventListener('change', render);
render();
</script>
</body>
</html>
