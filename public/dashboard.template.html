<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f8f9f7" />
<title>Claim Risk Engine — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Light theme shared with the sibling claims-analytics-dashboard / glossary projects:
     teal+emerald accents, Bricolage Grotesque display + Hanken Grotesk body, soft shadows.
     Google Fonts load when online; system-ui is the offline fallback. */
  :root {
    --bg: rgb(248 249 247); --surface: rgb(255 255 255); --line: rgb(228 230 229);
    --line-soft: rgb(240 241 240); --fg: rgb(23 28 33); --fg-soft: rgb(82 92 99);
    --muted: rgb(131 141 147); --accent: rgb(13 148 136); --accent-2: rgb(16 185 129);
    --accent-soft: rgb(219 244 237); --ok: rgb(13 148 136); --warn: rgb(217 119 6);
    --bad: rgb(220 38 38); --shadow: 15 23 30;
    --radius: 1.125rem;
    --soft: 0 1px 2px rgb(var(--shadow) / .04), 0 8px 24px -12px rgb(var(--shadow) / .18);
    --lift: 0 2px 4px rgb(var(--shadow) / .05), 0 18px 40px -16px rgb(var(--shadow) / .28);
    --display: "Bricolage Grotesque", system-ui, sans-serif;
    --sans: "Hanken Grotesk", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--fg); background: var(--bg);
    font: 14px/1.55 var(--sans); -webkit-font-smoothing: antialiased;
    padding: 30px clamp(16px, 4vw, 52px) 72px; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(40rem 40rem at 10% -12%, rgb(13 148 136 / .10), transparent 60%),
      radial-gradient(34rem 34rem at 100% 0%, rgb(16 185 129 / .08), transparent 55%);
  }
  body > * { position: relative; z-index: 1; }
  ::selection { background: rgb(13 148 136 / .22); }

  header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 28px; }
  h1 { font-family: var(--display); font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -.02em; }
  .sub { color: var(--fg-soft); margin-top: 6px; font-size: 13.5px; }
  .badge { padding: 9px 18px; border-radius: 999px; font-weight: 700; font-size: 13px; letter-spacing: .02em;
    border: 1px solid transparent; white-space: nowrap; box-shadow: var(--soft); }
  .badge.pass { background: var(--accent-soft); color: var(--accent); border-color: rgb(13 148 136 / .35); }
  .badge.fail { background: rgb(220 38 38 / .10); color: var(--bad); border-color: rgb(220 38 38 / .35); }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--soft); }
  .card .label { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
  .card .value { font-family: var(--display); font-size: 30px; font-weight: 700; margin-top: 8px; letter-spacing: -.02em; }
  .card .foot { color: var(--muted); font-size: 12px; margin-top: 5px; }
  .value.good { color: var(--ok); } .value.bad { color: var(--bad); }

  .grid2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 880px) { .grid2 { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--soft); }
  .panel h2 { font-size: 12.5px; margin: 0 0 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }

  .bars { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: 130px 1fr 54px; align-items: center; gap: 10px; font-size: 12px; }
  .bar-track { background: var(--line-soft); border-radius: 6px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .bar-row .num { color: var(--fg-soft); text-align: right; font-variant-numeric: tabular-nums; }

  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  input[type=search], select { background: var(--surface); border: 1px solid var(--line); color: var(--fg);
    padding: 9px 13px; border-radius: 10px; font-size: 13px; font-family: var(--sans); outline: none; transition: border-color .15s, box-shadow .15s; }
  input[type=search] { min-width: 230px; }
  input[type=search]:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgb(13 148 136 / .12); }
  .toggle { display: inline-flex; gap: 8px; align-items: center; color: var(--fg-soft); font-size: 13px; cursor: pointer; user-select: none; }
  .toggle input { accent-color: var(--accent); }
  .count { color: var(--muted); font-size: 13px; margin-left: auto; }

  .table-wrap { overflow: auto; max-height: 70vh; border-radius: 12px; scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .table-wrap::-webkit-scrollbar { height: 9px; width: 9px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--line); border-radius: 9999px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600;
    padding: 11px 13px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); }
  tbody td { padding: 12px 13px; border-bottom: 1px solid var(--line-soft); font-size: 13px; vertical-align: middle; }
  tbody tr.row { cursor: pointer; transition: background .12s; }
  tbody tr.row:hover { background: var(--line-soft); }
  .risk { display: flex; align-items: center; gap: 10px; min-width: 130px; }
  .risk .track { flex: 1; height: 8px; border-radius: 6px; background: var(--line-soft); overflow: hidden; }
  .risk .fill { height: 100%; border-radius: 6px; }
  .risk .n { width: 28px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; background: var(--accent-soft); color: var(--accent); }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .evidence { background: var(--bg); }
  .evidence td { padding: 0 13px; }
  .evidence .inner { padding: 6px 0 16px; display: flex; flex-direction: column; gap: 9px; }
  .flag { display: grid; grid-template-columns: 175px 64px 1fr; gap: 12px; align-items: start; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--soft); }
  .flag .rule { font-weight: 700; color: var(--accent); }
  .flag .sev { color: var(--warn); font-variant-numeric: tabular-nums; font-weight: 600; }
  .flag .ev { color: var(--fg-soft); }
  .muted { color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 30px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Claim Risk Engine — Dashboard</h1>
    <div class="sub" id="subtitle"></div>
  </div>
  <div id="verdict" class="badge"></div>
</header>

<section class="cards" id="cards"></section>

<section class="grid2">
  <div class="panel">
    <h2>Risk score distribution</h2>
    <div id="hist"></div>
  </div>
  <div class="panel">
    <h2>Per-pattern recall</h2>
    <div class="bars" id="patterns"></div>
  </div>
</section>

<section class="panel">
  <div class="controls">
    <input type="search" id="q" placeholder="Search claim, member, provider…" />
    <select id="rule"><option value="">All rules</option></select>
    <label class="toggle"><input type="checkbox" id="flaggedOnly" checked /> Flagged only</label>
    <span class="count" id="count"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Claim</th><th>Risk</th><th>Flags</th><th>Top rule</th><th>Diagnosis</th><th>Amount</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</section>

<script>
const DATA = __DATA__;
const { summary, rows } = DATA;

// Risk hue green→amber→red, tuned for legibility on a light surface.
const riskColor = (s) => `hsl(${Math.round(145 - (s / 100) * 145)}, 68%, 42%)`;
const pct = (x) => (x * 100).toFixed(1) + '%';
const money = (n) => '$' + n.toLocaleString('en-US');

// ---- header + verdict ----
document.getElementById('subtitle').textContent =
  `${summary.total.toLocaleString()} claims scored · decision threshold ≥ ${summary.threshold} · ${summary.flagged} flagged`;
const verdict = document.getElementById('verdict');
verdict.textContent = summary.pass ? '✓ PASS TARGET' : '✕ FAIL TARGET';
verdict.className = 'badge ' + (summary.pass ? 'pass' : 'fail');

// ---- metric cards ----
const cards = [
  { label: 'Precision', value: pct(summary.precision) },
  { label: 'Recall', value: pct(summary.recall), cls: summary.recall >= 0.7 ? 'good' : 'bad', foot: 'target ≥ 70%' },
  { label: 'False Positive Rate', value: pct(summary.fpr), cls: summary.fpr <= 0.2 ? 'good' : 'bad', foot: 'target ≤ 20%' },
  { label: 'Flagged', value: summary.flagged.toLocaleString(), foot: `of ${summary.total.toLocaleString()} claims` },
  { label: 'TP / FP / FN', value: `${summary.tp}/${summary.fp}/${summary.fn}`, foot: 'true / false pos · false neg' },
];
document.getElementById('cards').innerHTML = cards.map(c =>
  `<div class="card"><div class="label">${c.label}</div>
   <div class="value ${c.cls||''}">${c.value}</div>
   <div class="foot">${c.foot||''}</div></div>`).join('');

// ---- score histogram (inline SVG) ----
const buckets = Array.from({length: 10}, () => 0);
for (const r of rows) buckets[Math.min(9, Math.floor(r.score / 10))]++;
const maxB = Math.max(...buckets, 1);
const W = 520, H = 184, pad = 30, bw = (W - pad * 2) / 10;
let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">`;
buckets.forEach((b, i) => {
  const h = Math.round((b / maxB) * (H - pad * 2));
  const x = pad + i * bw, y = H - pad - h;
  const c = riskColor(i * 10 + 5);
  svg += `<rect x="${x + 3}" y="${y}" width="${bw - 6}" height="${h}" rx="5" fill="${c}" opacity="0.92"><title>${i*10}-${i*10+9}: ${b}</title></rect>`;
  if (b > 0) svg += `<text x="${x + bw/2}" y="${y - 6}" fill="#525c63" font-size="10" font-weight="600" text-anchor="middle">${b}</text>`;
  svg += `<text x="${x + bw/2}" y="${H - 10}" fill="#838d93" font-size="9.5" text-anchor="middle">${i*10}</text>`;
});
svg += `</svg>`;
document.getElementById('hist').innerHTML = svg;

// ---- per-pattern recall bars ----
const pp = summary.perPattern;
document.getElementById('patterns').innerHTML = Object.keys(pp).sort().map(k => {
  const v = pp[k];
  return `<div class="bar-row"><span>${k}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.recall*100)}%"></div></div>
    <span class="num">${v.caught}/${v.total}</span></div>`;
}).join('');

// ---- table with filters + expandable evidence ----
const ruleSet = [...new Set(rows.flatMap(r => r.flags.map(f => f.rule)))].sort();
const ruleSel = document.getElementById('rule');
ruleSel.innerHTML += ruleSet.map(r => `<option value="${r}">${r}</option>`).join('');

const tbody = document.getElementById('tbody');
const q = document.getElementById('q');
const flaggedOnly = document.getElementById('flaggedOnly');
const countEl = document.getElementById('count');
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function render() {
  const term = q.value.trim().toLowerCase();
  const ruleF = ruleSel.value;
  const onlyFlagged = flaggedOnly.checked;
  const filtered = rows.filter(r => {
    if (onlyFlagged && r.flags.length === 0) return false;
    if (ruleF && !r.flags.some(f => f.rule === ruleF)) return false;
    if (term && !(`${r.id} ${r.member} ${r.provider} ${r.dx}`.toLowerCase().includes(term))) return false;
    return true;
  });
  countEl.textContent = `${filtered.length.toLocaleString()} shown`;
  if (filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="empty">No matching claims</td></tr>`; return; }

  const view = filtered.slice(0, 400);
  tbody.innerHTML = view.map(r => {
    const col = riskColor(r.score);
    const flagsCell = r.flags.length
      ? `<span class="pill">${r.flags.length}</span>` : `<span class="muted">0</span>`;
    const top = r.topRule ? `<span class="mono">${esc(r.topRule)}</span>` : '<span class="muted">—</span>';
    const main = `<tr class="row" data-id="${esc(r.id)}">
      <td class="mono">${esc(r.id)}</td>
      <td><div class="risk"><div class="track"><div class="fill" style="width:${r.score}%;background:${col}"></div></div><span class="n">${r.score}</span></div></td>
      <td>${flagsCell}</td>
      <td>${top}</td>
      <td class="mono">${esc(r.dx)}</td>
      <td>${money(r.amount)}</td>
    </tr>`;
    const flagsHtml = r.flags.length
      ? r.flags.map(f => `<div class="flag"><span class="rule">${esc(f.rule)}</span><span class="sev">sev ${f.severity}</span><span class="ev">${esc(f.evidence)}</span></div>`).join('')
      : '<span class="muted">No rules fired for this claim.</span>';
    const detail = `<tr class="evidence" data-detail="${esc(r.id)}" style="display:none">
      <td colspan="6"><div class="inner">
        <span class="muted">${esc(r.id)} · member ${esc(r.member)} · provider ${esc(r.provider)} · ${esc(r.date)} · ${esc(r.type)}</span>
        ${flagsHtml}
      </div></td></tr>`;
    return main + detail;
  }).join('');
  if (filtered.length > view.length) {
    tbody.innerHTML += `<tr><td colspan="6" class="empty">Showing first ${view.length} of ${filtered.length}. Refine filters to see more.</td></tr>`;
  }
}

tbody.addEventListener('click', (e) => {
  const row = e.target.closest('tr.row');
  if (!row) return;
  const d = tbody.querySelector(`tr[data-detail="${row.dataset.id}"]`);
  if (d) d.style.display = d.style.display === 'none' ? 'table-row' : 'none';
});
q.addEventListener('input', render);
ruleSel.addEventListener('change', render);
flaggedOnly.addEventListener('change', render);
render();
</script>
</body>
</html>
